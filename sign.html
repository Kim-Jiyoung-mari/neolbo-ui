<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- 파비콘&글꼴 -->
    <link rel="shortcut icon" href="./images/fabicon.png" type="iamge/x-icon">
    <link rel="icon" href="./images/fabicon.png" type="image/x-icon">
    <href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-dynamic-subset.min.css"></href>

    <!-- 디자인파일 -->
    <link rel="stylesheet" href="./styles/reset.css">
    <link rel="stylesheet" href="./styles/sign.css">

    <!-- 스크립트 -->
    <title>Planer | 늘보</title>
</head>
<body>
    <main>
        <div class="sign_top">
            <h1><a href="./intdex.html"><img src="./images/logo.png" alt="늘보"></a></h1>
            <p>Let’s get Started!</p>
        </div>
        <div class="sign_wrap">
            <div class="sign_title"><p>Sign Up</p></div>
            <div class="sign_container">
                <form action="#" method="post">
                    <dl class="name_check">
                        <dt>이름</dt>
                        <dd><input type="text" name="user_name" id="user_name" placeholder="이름을 입력해주세요."></dd>
                    </dl>
                    <dl class="email_check">
                        <dt>이메일</dt>
                        <dd>
                            <input type="text" name="user_email" id="user_email" placeholder="이메일을 입력해주세요.">
                            @
                            <select name="email_list" id="email_list">
                                <option value="direct">선택해주세요.</option>
                                <option value="kakao">kakao.com</option>
                                <option value="hanmail">hanmail.net</option>
                                <option value="nate">nate.com</option>
                            </select>
                        </dd>
                        <button type="button" id="email_check">E-mail 확인</button>
                    </dl>
                    <dl class="pw_check">
                        <dt>비밀번호</dt>
                        <dd><input type="password" name="user_pw" id="user_pw" placeholder="비밀번호를 입력해주세요."></dd>
                        <dd><input type="password" name="user_pwpw" id="user_pwpw" placeholder="비밀번호를 확인해주세요."></dd>
                    </dl>
                    <div class="signup_btn">
                        <button type="button" id="signup_btn">Sign Up</button>
                    </div>
                </form>
                <div class="sign_sns">
                    <p>or</p>
                    <div class="sns_wrap">
                        <a href="#"><img src="./images/kakao.png" alt="카카오계정 로그인/회원가입"></a>
                        <a href="#"><img src="./images/naver.png" alt="네이버계정 로그인/회원가입"></a>
                        <a href="#"><img src="./images/google.png" alt="구글계정 로그인/회원가입"></a>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
