<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- 파비콘&글꼴 -->
    <link rel="shortcut icon" href="./images/fabicon.png" type="iamge/x-icon">
    <link rel="icon" href="./images/fabicon.png" type="image/x-icon">
    <href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-dynamic-subset.min.css"></href>

    <!-- 디자인파일 -->
    <link rel="stylesheet" href="./styles/reset.css">
    <link rel="stylesheet" href="./styles/login.css">

    <!-- 스크립트 -->
    <title>Planer | 늘보</title>
</head>
<body>
    <main>
        <h1><a href="./intdex.html"><img src="./images/logo.png" alt="늘보"></a></h1>
        <div class="login_wrap">
            <div class="login_title"><p>LOGIN</p></div>
            <div class="login_container">
                <form action="#" method="post">
                    <div class="login_box">
                        <dl>
                            <dt>이메일</dt>
                            <dd><input type="email" name="use_id" id="use_id" placeholder="이메일을 입력하세요."></dd>
                        </dl>
                        <dl>
                            <dt>비밀번호</dt>
                            <dd><input type="password" name="use_pw" id="use_pw" placeholder="비밀번호를 입력하세요."></dd>
                        </dl>
                    </div>
                    <div class="login_btn">
                        <button type="button" id="login_btn">로그인</button>
                    </div>
                    <div class="search_join">
                        <a href="#">아이디/비밀번호 찾기</a>
                        <a href="./sign.html">회원가입</a>
                    </div>
                </form>
                <div class="login_sns">
                    <p>SNS 계정으로 로그인</p>
                    <div class="sns_wrap">
                        <a href="#"><img src="./images/kakao.png" alt="카카오계정 로그인/회원가입"></a>
                        <a href="#"><img src="./images/naver.png" alt="네이버계정 로그인/회원가입"></a>
                        <a href="#"><img src="./images/google.png" alt="구글계정 로그인/회원가입"></a>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
